services:
  app:
    image: ghcr.io/sn0walice/capsule:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-capsule}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-capsule}
      - SESSION_SECRET=${SESSION_SECRET}
      - DISABLE_REGISTER=${DISABLE_REGISTER:-false}
    volumes:
      - ${MEDIA_PATH:-./media}:/media
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ghcr.io/sn0walice/capsule:latest
    command: node src/worker.js
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-capsule}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-capsule}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-2}
    volumes:
      - ${MEDIA_PATH:-./media}:/media
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
      MYSQL_DATABASE: ${DB_NAME:-capsule}
      MYSQL_USER: ${DB_USER:-capsule}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
